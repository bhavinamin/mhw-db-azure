name: Deploy Azure Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-infra.yml"
      - "infra/**"
  workflow_dispatch:

concurrency:
  group: deploy-infra
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_USE_OIDC: "true"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_location: ${{ vars.AZURE_LOCATION || 'eastus' }}
  TF_VAR_name: ${{ vars.APP_NAME }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER_NAME }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="use_oidc=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
